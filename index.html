<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blind Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: monospace;
  }
  #yt-container {
    position: fixed; top: -9999px; left: -9999px;
    width: 1px; height: 1px; opacity: 0; pointer-events: none;
  }
  #screen { text-align: center; user-select: none; }
  #card-num {
    font-size: 5rem; font-weight: bold;
    color: #1a1a1a; letter-spacing: 8px;
  }
  #bars {
    display: flex; gap: 4px;
    justify-content: center; align-items: flex-end;
    height: 24px; margin-top: 20px;
  }
  .bar {
    width: 4px; background: #222; border-radius: 2px;
    animation: bounce 1s ease-in-out infinite;
  }
  .bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
  .bar:nth-child(2) { animation-delay: 0.15s; height: 16px; }
  .bar:nth-child(3) { animation-delay: 0.3s;  height: 24px; }
  .bar:nth-child(4) { animation-delay: 0.15s; height: 16px; }
  .bar:nth-child(5) { animation-delay: 0s;    height: 8px; }
  @keyframes bounce {
    0%, 100% { transform: scaleY(0.4); }
    50%       { transform: scaleY(1); }
  }
  .bar.paused { animation-play-state: paused; }
  #status {
    font-size: 0.75rem; color: #1a1a1a;
    margin-top: 12px; letter-spacing: 2px;
  }
  #error-msg {
    display: none;
    font-size: 0.65rem; color: #8b0000;
    margin-top: 14px; letter-spacing: 1px;
    max-width: 260px; line-height: 1.7;
    text-align: center;
  }
  #tap-hint {
    position: fixed; bottom: 40px; width: 100%;
    text-align: center; font-size: 0.6rem;
    color: #111; letter-spacing: 3px;
  }
</style>
</head>
<body>

<div id="yt-container"><div id="player"></div></div>

<div id="screen">
  <div id="card-num">—</div>
  <div id="bars">
    <div class="bar paused"></div>
    <div class="bar paused"></div>
    <div class="bar paused"></div>
    <div class="bar paused"></div>
    <div class="bar paused"></div>
  </div>
  <div id="status">chargement...</div>
  <div id="error-msg"></div>
</div>
<div id="tap-hint">appuyer pour pause / lecture</div>

<script>
// ── DECK RAP FRANÇAIS (#1–#55) — YouTube ────────────────────────────────────
const rap = {
   1:"Oudg1KpSIV8",  2:"-7DpZUKgpjk",  3:"cbMgzkjJcDA",  4:"LtbMY6AGioc",
   5:"7kHo8FvjMv4",  6:"Ymh15CEloM8",  7:"tQ1sRTfbxxg",  8:"zrT0UYCeT1w",
   9:"f1h9_mxQbnU", 10:"g6QRV9Fzv1Y", 11:"SkarLHsSnA4", 12:"wEgl-Ugs-iY",
  13:"YGezQhUBYmU", 14:"dLjvs3afOHE", 15:"0TYKFZijyRc", 16:"tkaQL_j4pxM",
  17:"gDxSQMWXKss", 18:"_aCzwan1Lto", 19:"mAUn_cqF2CU", 20:"EpG7Eeq39qE",
  21:"WyDEZT5bOow", 22:"vxt6EFYfnVY", 23:"UDy4cbDfyV4", 24:"0W5eDmHG8PY",
  25:"serL-hnZP4Y", 26:"LgxDgjEa1wY", 27:"ZHbxZ5RAHNI", 28:"zZnV64lv9wk",
  29:"tdWnrbUf0sk", 30:"DWiiuWGYqQ8", 31:"2QuW4YgOpAA", 32:"LyM_bEkdoaw",
  33:"WWawqO2PZN4", 34:"Rp0CTIX5d4E", 35:"Ku42ZvLfvPs", 36:"pJsdsQoY_aQ",
  37:"mRvUT96JgbM", 38:"93JKUnPBANU", 39:"YeFWiluscbw", 40:"DRl6NyLtGEA",
  41:"ypNpnoKfqok", 42:"o3pMSThaJhg", 43:"01N6GGYyaTE", 44:"-sEzjwjdS18",
  45:"wHicXdfxopQ", 46:"LilpleXgDXo", 47:"q9KvXpnEQU4", 48:"jMJvj4gWbD4",
  49:"ieAtGZf_xoo", 50:"1B1DduVCZqg", 51:"YkoXOM-mgn8", 52:"L5TrEJPVCgU",
  53:"KsYhoOcRlcQ", 54:"7e1qUklCEDA", 55:"Ld9atdnJmk0",
};

// ── DECK HITS (#101–#150) — Deezer preview 30s, sans pub, sans blocage ──────
// IDs Deezer : api.deezer.com/track/ID
const hits = {
  101: 906336,      // Nirvana – Smells Like Teen Spirit
  102: 51547,       // Whitney Houston – I Will Always Love You
  103: 67261691,    // Coolio – Gangsta's Paradise
  104: 72890,       // Notorious B.I.G. – Hypnotize
  105: 731729,      // Backstreet Boys – I Want It That Way
  106: 3157621,     // Cher – Believe
  107: 1109731,     // Oasis – Wonderwall
  108: 659784,      // TLC – No Scrubs
  109: 2178,        // Ricky Martin – Livin' la Vida Loca
  110: 720181,      // Spice Girls – Wannabe
  111: 916424,      // Eminem – Lose Yourself
  112: 916886,      // Beyoncé – Crazy In Love
  113: 1207274,     // Nelly – Hot In Herre
  114: 4037491,     // Outkast – Hey Ya!
  115: 1258841,     // Amy Winehouse – Rehab
  116: 5535873,     // Justin Timberlake – SexyBack
  117: 1638695,     // Gnarls Barkley – Crazy
  118: 2557980,     // Rihanna – Umbrella
  119: 1179944,     // Kanye West – Gold Digger
  120: 720672,      // 50 Cent – In Da Club
  121: 10444881,    // Adele – Rolling in the Deep
  122: 67247832,    // Daft Punk – Get Lucky
  123: 67491400,    // PSY – Gangnam Style
  124: 67550766,    // Robin Thicke – Blurred Lines
  125: 67545996,    // Pharrell Williams – Happy
  126: 135558798,   // Ed Sheeran – Shape of You
  127: 86270958,    // Mark Ronson ft Bruno Mars – Uptown Funk
  128: 81592187,    // Sia – Chandelier
  129: 126068641,   // Drake – One Dance
  130: 119206016,   // Luis Fonsi – Despacito
  131: 725215792,   // The Weeknd – Blinding Lights
  132: 705657042,   // Billie Eilish – Bad Guy
  133: 702490342,   // Lil Nas X – Old Town Road
  134: 455978651,   // Post Malone – Rockstar
  135: 391579151,   // Kendrick Lamar – HUMBLE.
  136: 325964691,   // Bruno Mars – That's What I Like
  137: 376636521,   // Cardi B – Bodak Yellow
  138: 547876502,   // Childish Gambino – This Is America
  139: 744977482,   // Ariana Grande – Thank U, Next
  140: 752325062,   // Lizzo – Truth Hurts
  141: 1255793642,  // Olivia Rodrigo – drivers license
  142: 1086591692,  // Doja Cat – Say So
  143: 1242440852,  // Bad Bunny – Dakiti
  144: 1213604682,  // Dua Lipa – Levitating
  145: 1668497677,  // Harry Styles – As It Was
  146: 1762791807,  // Taylor Swift – Anti-Hero
  147: 1665008827,  // SZA – Kill Bill
  148: 1848132067,  // Miley Cyrus – Flowers
  149: 1929036207,  // Ice Spice – Princess Diana
  150: 2399644985,  // Sabrina Carpenter – Espresso
};

// ── INIT ─────────────────────────────────────────────────────────────────────
const hash      = parseInt(window.location.hash.replace('#','')) || null;
const isRap     = hash >= 1   && hash <= 55;
const isHits    = hash >= 101 && hash <= 150;
const cardNumEl = document.getElementById('card-num');
const statusEl  = document.getElementById('status');
const errorEl   = document.getElementById('error-msg');
const bars      = document.querySelectorAll('.bar');

function setPlaying(p) {
  bars.forEach(b => b.classList.toggle('paused', !p));
  statusEl.textContent = p ? '♪ en cours' : 'en pause';
}

function showError(msg) {
  setPlaying(false);
  errorEl.style.display = 'block';
  errorEl.textContent   = '⚠ ' + msg;
  statusEl.textContent  = 'erreur';
}

if (!hash || (!isRap && !isHits)) {
  cardNumEl.textContent = '?';
  statusEl.textContent  = 'carte introuvable';
} else {
  cardNumEl.textContent = `#${hash}`;
  statusEl.textContent  = 'chargement...';
}

// ── MODE HITS : Deezer preview audio (30s, sans pub) ─────────────────────────
if (isHits) {
  const deezerId = hits[hash];
  let audio = null;

  // Appel JSONP pour récupérer l'URL de preview
  window._deezerCB = (data) => {
    if (!data || !data.preview) {
      showError('Preview Deezer indisponible pour ce titre.');
      return;
    }
    audio = new Audio(data.preview);
    audio.volume = 1;

    const tryPlay = () => {
      audio.play()
        .then(() => { setPlaying(true); errorEl.style.display = 'none'; })
        .catch(() => {
          showError('Appuie sur l\'écran pour lancer la lecture.');
        });
    };

    audio.addEventListener('ended',   () => setPlaying(false));
    audio.addEventListener('pause',   () => setPlaying(false));
    audio.addEventListener('playing', () => setPlaying(true));
    audio.addEventListener('error',   () => showError('Erreur de lecture audio.'));

    tryPlay();
  };

  const script = document.createElement('script');
  script.src = `https://api.deezer.com/track/${deezerId}?output=jsonp&callback=_deezerCB`;
  script.onerror = () => showError('Impossible de contacter Deezer. Vérifie ta connexion.');
  document.head.appendChild(script);

  // Tap pour pause/play
  document.body.addEventListener('click', () => {
    if (!audio) return;
    audio.paused ? audio.play() : audio.pause();
  });
}

// ── MODE RAP : YouTube iframe (son uniquement, vidéo cachée) ──────────────────
if (isRap) {
  const ytId = rap[hash];
  let player;

  window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('player', {
      height:'1', width:'1', videoId: ytId,
      playerVars: {
        autoplay:1, controls:0, disablekb:1, fs:0,
        iv_load_policy:3, modestbranding:1, rel:0, showinfo:0, playsinline:1,
      },
      events: {
        onReady:       e => { e.target.setVolume(100); e.target.playVideo(); },
        onStateChange: e => {
          const S = YT.PlayerState;
          if (e.data === S.PLAYING) setPlaying(true);
          if (e.data === S.PAUSED || e.data === S.ENDED) setPlaying(false);
        },
        onError: e => {
          const msgs = {
            2:   'Paramètre invalide.',
            5:   'Erreur lecteur HTML5.',
            100: 'Vidéo introuvable ou supprimée.',
            101: 'Lecture en embed non autorisée par l\'artiste.',
            150: 'Lecture en embed non autorisée par l\'artiste.',
          };
          showError('YouTube : ' + (msgs[e.data] || `Erreur ${e.data}.`));
        }
      }
    });
  };

  document.body.addEventListener('click', () => {
    if (!player) return;
    player.getPlayerState() === YT.PlayerState.PLAYING
      ? player.pauseVideo() : player.playVideo();
  });

  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}
</script>
</body>
</html>
